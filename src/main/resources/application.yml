spring:
  application:
    name: codecrack

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000

# Actuator Configuration (Monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Application Configuration
app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-minimum-256-bits-change-this-in-production-must-be-long-enough}
    access-token-expiration: 900000      # 15 minutes
    refresh-token-expiration: 604800000  # 7 days

  queue:
    submissions: code.submissions.queue
    submissions-priority: code.submissions.priority.queue
    submissions-dlq: code.submissions.dlq

  scaling:
    enabled: true
    min-workers: 3
    max-workers: 10
    check-interval: 15000
    cooldown-seconds: 60
    thresholds:
      high: 100
      medium-high: 51
      medium: 21

  scaler:
    type: ${SCALER_TYPE:docker-compose}

  cache:
    problems:
      ttl: 7200  # 2 hours
    submissions:
      ttl: 1800  # 30 minutes
    leaderboard:
      ttl: 900   # 15 minutes

  rate-limit:
    requests-per-minute: 100
    submissions-per-minute: 10

  docker:
    socket: unix:///var/run/docker.sock
    images:
      java: openjdk:17-alpine
      python: python:3.11-alpine
      cpp: gcc:11-alpine

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  # Exclude Redis and RabbitMQ in dev (no external services needed)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  datasource:
    url: jdbc:h2:mem:codecrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.codecrack: DEBUG
    org.springframework.security: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:codecrack}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: PrimaryHikariPool

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    com.codecrack: INFO
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

spring:
  application:
    name: codecrack
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASS:admin123}
    listener:
      simple:
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:CodeCrackSuperSecretJWTKeyMinimum256BitsLongEnoughForProduction123456}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  queue:
    submissions: code.submissions.queue
    submissions-priority: code.submissions.priority.queue
    submissions-dlq: code.submissions.dlq
  docker:
    socket: unix:///var/run/docker.sock
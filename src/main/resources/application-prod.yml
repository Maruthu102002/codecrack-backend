spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/codecrack}
    username: ${SPRING_DATASOURCE_USERNAME:codecrack}
    password: ${SPRING_DATASOURCE_PASSWORD:codecrack123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: redis
      port: 6379
      password:
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
logging:
  level:
    com.codecrack: INFO
